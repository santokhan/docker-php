services:
  web:
    # image: php:8.2-apache
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
    # Move all db files inside docker
    volumes:
      - ./db:/docker-entrypoint-initdb.d